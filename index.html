<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="База ЦТАИ">
  
  <title>База данных ЦТАИ АСУ ТП</title>
  
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=18">
  <link rel="icon" type="image/png" href="apple-touch-icon.png?v=18">
  
  <link rel="stylesheet" href="styles.css?v=18">
  <script>
    // Предотвращение вспышки темы при загрузке
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Сменить тему">
          <span class="sun-icon">☀️</span>
          <span class="moon-icon">🌙</span>
        </button>
      </div>
      <div class="header-inner">
        <h1 id="pageTitle" class="title">База данных</h1>
        <p id="pageSubtitle" class="subtitle">ЦТАИ АСУ ТП</p>
      </div>
    </header>

    <main class="main">
      <section id="screen-main" class="tab-content active">
        <div class="panel">
          <nav class="blocks" id="tabs-main"></nav>
        </div>
      </section>

      <section id="screen-charts" class="tab-content">
        <div class="panel">
          <div class="empty-state">
            <span class="empty-icon">📈</span>
            <h3>Графики</h3>
            <p>Здесь скоро появятся графики смен, отпусков и планы обучения персонала.</p>
          </div>
        </div>
      </section>

      <section id="screen-edu" class="tab-content">
        <div class="panel">
          <div class="empty-state">
            <span class="empty-icon">👨‍🎓</span>
            <h3>Обучение</h3>
            <p>Раздел в разработке: здесь будут тесты по охране труда и ПТЭ.</p>
          </div>
        </div>
      </section>

      <section id="screen-support" class="tab-content">
        <div class="panel">
          <div class="support-page">
            <span class="support-large-icon">✉️</span>
            <h3>Поддержка</h3>
            <p>Есть идеи по улучшению базы или нашли ошибку? Напишите разработчику напрямую.</p>
            <a href="mailto:i.rygih@mail.ru?subject=База ЦТАИ: Поддержка" class="support-action-btn">
              Написать письмо
            </a>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="main">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Главная</span>
      </button>
      <button class="nav-item" data-screen="charts">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Графики</span>
      </button>
      <button class="nav-item" data-screen="edu">
        <span class="nav-icon">🎓</span>
        <span class="nav-label">Тесты</span>
      </button>
      <button class="nav-item" data-screen="support">
        <span class="nav-icon">💬</span>
        <span class="nav-label">Помощь</span>
      </button>
    </nav>
  </div>

  <div id="modal" class="modal" role="dialog" aria-modal="true" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <div class="modal-head">
        <div class="phantom"></div>
        <h2 id="modalTitle" class="modal-title"></h2>
        <button type="button" class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <ul id="modalList" class="modal-list"></ul>
      </div>
    </div>
  </div>

  <script src="app.js?v=18"></script>
</body>
</html>
