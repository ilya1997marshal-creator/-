<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>База инструкций</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top">
    <h1>База инструкций</h1>
    <p class="subtitle">Выберите блок — откроется окно со списком PDF.</p>
  </header>

  <nav class="tabs" id="tabs" aria-label="Блоки"></nav>

  <main class="welcome">
    <p>Нажмите на нужный блок выше.</p>
  </main>

  <div id="modal" class="modal" role="dialog" aria-modal="true" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-box">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
        <button type="button" class="modal-close" id="modalClose" aria-label="Закрыть">×</button>
      </div>
      <ul id="modalList" class="modal-list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
